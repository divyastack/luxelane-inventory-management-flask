{% extends "base.html" %}
{% block title %}Add Category — {{ store_name }}{% endblock %}
{% block page_title %}Add Category{% endblock %}

{% block content %}
<div style="max-width:520px">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">🏷️ New Category</span>
    </div>
    <div class="panel-body">
      <form method="POST" action="{{ url_for('add_category') }}">
        <div class="form-grid" style="margin-bottom:20px">
          <div class="form-group">
            <label class="form-label">Category Name *</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Dresses" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Icon Key</label>
            <select name="icon" class="form-control">
              <option value="dress">👗 Dress</option>
              <option value="top">👚 Top</option>
              <option value="bottom">👖 Bottom</option>
              <option value="traditional">🥻 Traditional</option>
              <option value="winter">🧥 Winter Wear</option>
              <option value="accessory">👜 Accessory</option>
              <option value="footwear">👠 Footwear</option>
              <option value="gift">🎁 Gift</option>
              <option value="other">🏷️ Other</option>
            </select>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-control" placeholder="Short description of this category">
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Save Category</button>
          <a href="{{ url_for('category_list') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
