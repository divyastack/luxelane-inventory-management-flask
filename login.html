<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — {{ store_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container" id="fc">
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{% if cat=='error' %}✕{% else %}ℹ{% endif %} {{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<div class="login-page">
  <div class="login-box">
    <div class="login-brand">
      <div style="font-size:2.2rem;margin-bottom:8px">👗</div>
      <div class="login-brand-name">{{ store_name }}</div>
      <div class="login-brand-sub">Inventory Management</div>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:.95rem">
        Sign In →
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.74rem;color:var(--muted)">
      Default: <code style="color:var(--accent)">admin</code> / <code style="color:var(--accent)">admin123</code>
    </p>
  </div>
</div>
<script>
  setTimeout(() => { const f = document.getElementById('fc'); if(f){f.style.opacity='0';f.style.transition='opacity .4s';} }, 4000);
</script>
</body>
</html>
