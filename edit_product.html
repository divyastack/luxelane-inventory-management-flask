{% extends "base.html" %}
{% block title %}Edit Product — {{ store_name }}{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div style="max-width:700px">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">✎ Edit Product</span>
      <span style="font-size:.74rem;color:var(--muted)">ID #{{ product.id }}</span>
    </div>
    <div class="panel-body">
      <form method="POST" action="{{ url_for('edit_product', pid=product.id) }}">

        <div class="form-grid" style="margin-bottom:20px">
          <div class="form-group form-full">
            <label class="form-label">Product Name *</label>
            <input type="text" name="name" class="form-control" value="{{ product.name }}" required autofocus>
          </div>

          <div class="form-group">
            <label class="form-label">Category *</label>
            <select name="category_id" class="form-control" required>
              {% for cat in categories %}
              <option value="{{ cat.id }}" {% if cat.id == product.category_id %}selected{% endif %}>
                {{ cat.icon }} {{ cat.name }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">SKU / Product Code</label>
            <input type="text" name="sku" class="form-control" value="{{ product.sku or '' }}">
          </div>

          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input type="number" name="price" class="form-control" value="{{ product.price }}" min="0" step="0.01" required>
          </div>

          <div class="form-group">
            <label class="form-label">Stock Quantity *</label>
            <input type="number" name="quantity" class="form-control" value="{{ product.quantity }}" min="0" required>
            {% if product.quantity < 5 %}
            <span class="form-hint" style="color:var(--rose)">⚠ Currently below low-stock threshold</span>
            {% endif %}
          </div>

          <div class="form-group">
            <label class="form-label">Available Sizes</label>
            <input type="text" name="size" class="form-control" value="{{ product.size or '' }}">
          </div>

          <div class="form-group">
            <label class="form-label">Color</label>
            <input type="text" name="color" class="form-control" value="{{ product.color or '' }}">
          </div>
        </div>

        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Update Product</button>
          <a href="{{ url_for('products') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
